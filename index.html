<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Mi Tienda</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9ecf, #ff6fa5);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: #ffffff;
    padding: 30px;
    width: 320px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    text-align: center;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #d63384;
    margin-bottom: 15px;
}

label {
    font-size: 14px;
    text-align: left;
    display: block;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #ff4d88;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #e6005c;
}

.mensaje {
    margin-top: 10px;
    font-size: 13px;
}

.recuperar {
    font-size: 12px;
    margin-top: 10px;
}

.recuperar a {
    color: #d63384;
    text-decoration: none;
}

.recuperar a:hover {
    text-decoration: underline;
}

.footer {
    text-align: center;
    font-size: 12px;
    margin-top: 15px;
}
</style>

</head>

<body>

<div class="login-box">

    <div class="logo">🛍️ Mi Tienda</div>

    <label>Usuario</label>
    <input type="text" id="usuario" placeholder="Ingrese su usuario">

    <label>Contraseña</label>
    <input type="password" id="clave" placeholder="Ingrese su contraseña">

    <button onclick="login()">Ingresar</button>

    <div class="mensaje" id="mensaje"></div>

    <div class="recuperar">
        ¿Olvidaste tu contraseña? 
        <a href="mailto:aldanaruizcarrizales@gmail.com">Contáctanos</a>
    </div>

    <div class="footer">
        © 2026 - Sistema de acceso
    </div>

</div>

<script>
function login() {
    let user = document.getElementById("usuario").value;
    let pass = document.getElementById("clave").value;
    let mensaje = document.getElementById("mensaje");

    if (user === "admin" && pass === "1234") {
        mensaje.style.color = "green";
        mensaje.innerHTML = "✔ Bienvenido a Mi Tienda";
    } else {
        mensaje.style.color = "red";
        mensaje.innerHTML = "❌ Usuario o contraseña incorrectos";
    }
}
</script>

</body>
</html>
