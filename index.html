<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Mi Tienda melisa💖 </title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9ecf, #ff6fa5);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: #ffffff;
    padding: 30px;
    width: 320px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

h2 {
    text-align: center;
    color: #d63384;
}

label {
    font-size: 14px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #ff4d88;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #e6005c;
}

.footer {
    text-align: center;
    font-size: 12px;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="login-box">
    <h2>Mi Tienda</h2>

    <label>Usuario</label>
    <input type="text" placeholder="Ingrese su usuario">

    <label>Contraseña</label>
    <input type="password" placeholder="Ingrese su contraseña">

    <button>Ingresar</button>

    <div class="footer">
        © 2026 - Sistema de acceso
    </div>
</div>

</body>
</html>
